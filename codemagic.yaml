workflows:
  android-closed-testing:
    name: Android Closed Testing
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      groups:
        - loit_signing       # CM_KEYSTORE, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
        - loit_env_prod      # ENV_PRODUCTION_JSON (base64)
        - loit_google        # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS, GOOGLE_SERVICES_JSON (base64)
        - loit_sentry        # SENTRY_AUTH_TOKEN
        - loit_other         # SUPABASE_GATE_URL, SUPABASE_GATE_SERVICE_KEY (service-role, write app_release_gate)
      vars:
        PACKAGE_NAME: id.activid.loit
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    scripts:
      - name: Sanity check toolchain
        script: |
          set -euo pipefail
          command -v jq >/dev/null 2>&1 || brew install jq
          : "${CM_KEYSTORE:?missing}"
          : "${CM_KEYSTORE_PASSWORD:?missing}"
          : "${CM_KEY_ALIAS:?missing}"
          : "${CM_KEY_PASSWORD:?missing}"
          : "${ENV_PRODUCTION_JSON:?missing}"
          : "${GOOGLE_SERVICES_JSON:?missing}"
      - name: Decode keystore
        script: |
          set -euo pipefail
          echo "$CM_KEYSTORE" | base64 --decode > "$CM_BUILD_DIR/android/app/loit-release.keystore"
          test -s "$CM_BUILD_DIR/android/app/loit-release.keystore" || { echo "keystore empty after decode"; exit 1; }
          file "$CM_BUILD_DIR/android/app/loit-release.keystore" | grep -qiE 'keystore|data' \
            || { echo "keystore decode produced unexpected file type"; exit 1; }
      - name: Write key.properties
        script: |
          set -euo pipefail
          cat > "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=loit-release.keystore
          EOF
      - name: Restore env.production.json
        script: |
          set -euo pipefail
          echo "$ENV_PRODUCTION_JSON" | base64 --decode > "$CM_BUILD_DIR/env.production.json"
          jq empty "$CM_BUILD_DIR/env.production.json" \
            || { echo "env.production.json is not valid JSON after decode"; exit 1; }
      - name: Restore google-services.json
        script: |
          set -euo pipefail
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > "$CM_BUILD_DIR/android/app/google-services.json"
          jq empty "$CM_BUILD_DIR/android/app/google-services.json" \
            || { echo "google-services.json is not valid JSON after decode"; exit 1; }
      - name: Flutter pub get
        script: flutter pub get
      - name: Build runner codegen
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos --no-fatal-warnings
      - name: Flutter test
        script: |
          if [ -d test ] && [ -n "$(find test -name '*_test.dart' -print -quit)" ]; then
            flutter test
          else
            echo "No tests found, skipping."
          fi
        ignore_failure: false
      - name: Build AAB
        script: |
          set -euo pipefail
          POSTHOG_API_KEY=$(jq -r '.POSTHOG_API_KEY // empty' env.production.json)
          [ -n "$POSTHOG_API_KEY" ] || { echo "POSTHOG_API_KEY missing from env.production.json"; exit 1; }
          flutter build appbundle --release \
            --dart-define-from-file=env.production.json \
            -Pposthog.api.key="$POSTHOG_API_KEY" \
            --build-number=$(($(date +%s) / 60))
      - name: Update release gate (ADR-0015)
        # Parses the release tag and upserts app_release_gate, cascading up so
        # min <= recommended <= latest holds:
        #   v1.2.0             -> latest = 1.2.0
        #   v1.2.0-recommended -> recommended = latest = 1.2.0
        #   v1.2.0-breaking    -> min = recommended = latest = 1.2.0
        # MONOTONIC-UP: a threshold may only RISE. Tags fire in push order, not
        # version order, so a stale/lower/backport tag (e.g. a v1.0.9 hotfix cut
        # after v1.1.0) must never regress the gate. Each field is max()-ed
        # against its current value; lowering a threshold is a deliberate manual
        # SQL override only (ADR-0015).
        # Runs pre-publish, so `min_version` rises hours-to-days before Play
        # actually serves the build. The row is a DECLARED floor, not an enforced
        # one: below-floor clients land in Stranded (dismissible) until the device
        # reports an installable update, then in Blocked (ADR-0030). Do not read
        # min_version as "users currently locked out". Best-effort: never fails
        # the build.
        script: |
          set -uo pipefail
          : "${SUPABASE_GATE_URL:?missing}"
          : "${SUPABASE_GATE_SERVICE_KEY:?missing}"
          TAG="${CM_TAG:-}"
          [ -n "$TAG" ] || { echo "no CM_TAG, skipping gate update"; exit 0; }
          VER="${TAG#v}"            # strip leading v -> 1.2.0 or 1.2.0-breaking
          BASE="${VER%%[-+]*}"     # 1.2.0 (strip -suffix and/or +build metadata)
          SUFFIX=""
          case "$VER" in *-*) SUFFIX="${VER#*-}"; SUFFIX="${SUFFIX%%+*}";; esac

          # Numeric semver compare (1.0.9 < 1.0.10). Pure awk -> no `sort -V`
          # dependency (BSD/mac sort lacks it). vge a b -> 1 if a >= b.
          vge() { awk -v a="$1" -v b="$2" 'BEGIN{
            n=split(a,A,"."); m=split(b,B,"."); L=(n>m)?n:m;
            for(i=1;i<=L;i++){x=(i<=n)?A[i]+0:0; y=(i<=m)?B[i]+0:0;
              if(x>y){print 1;exit} if(x<y){print 0;exit}} print 1 }'; }
          vmax() { if [ "$(vge "$1" "$2")" = 1 ]; then printf '%s' "$1"; else printf '%s' "$2"; fi; }
          field() { printf '%s' "$1" | grep -o "\"$2\":\"[^\"]*\"" | head -1 | sed 's/.*:"//;s/"$//'; }

          # Read current thresholds to enforce monotonic-up. If the read fails we
          # skip rather than risk a blind overwrite that could regress the gate.
          ROW=$(curl -fsS \
            -H "apikey: $SUPABASE_GATE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_GATE_SERVICE_KEY" \
            "$SUPABASE_GATE_URL/rest/v1/app_release_gate?id=eq.1&select=min_version,recommended_version,latest_version") \
            || { echo "WARN: could not read current gate; skipping (non-fatal)"; exit 0; }
          CUR_MIN=$(field "$ROW" min_version);          CUR_MIN="${CUR_MIN:-0.0.0}"
          CUR_REC=$(field "$ROW" recommended_version);  CUR_REC="${CUR_REC:-0.0.0}"
          CUR_LAT=$(field "$ROW" latest_version);        CUR_LAT="${CUR_LAT:-0.0.0}"

          NEW_LAT=$(vmax "$CUR_LAT" "$BASE")
          NEW_REC="$CUR_REC"; NEW_MIN="$CUR_MIN"
          case "$SUFFIX" in
            recommended) NEW_REC=$(vmax "$CUR_REC" "$BASE");;
            breaking)    NEW_REC=$(vmax "$CUR_REC" "$BASE"); NEW_MIN=$(vmax "$CUR_MIN" "$BASE");;
          esac
          PATCH="{\"min_version\":\"$NEW_MIN\",\"recommended_version\":\"$NEW_REC\",\"latest_version\":\"$NEW_LAT\",\"updated_at\":\"$(date -u +%FT%TZ)\"}"
          echo "Release gate (tag $TAG): min $CUR_MIN->$NEW_MIN  rec $CUR_REC->$NEW_REC  latest $CUR_LAT->$NEW_LAT"
          curl -fsS -X PATCH "$SUPABASE_GATE_URL/rest/v1/app_release_gate?id=eq.1" \
            -H "apikey: $SUPABASE_GATE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_GATE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$PATCH" || echo "WARN: release gate update failed (non-fatal)"
        ignore_failure: true
    artifacts:
      - build/**/outputs/bundle/**/*.aab
      - build/**/outputs/mapping/**/mapping.txt
      - flutter_drive.log
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        # Play Console production track (live to all users).
        track: "production"
        submit_as_draft: false
      email:
        recipients:
          - edotanod@gmail.com
        notify:
          success: true
          failure: true
