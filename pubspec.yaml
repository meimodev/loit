name: loit
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.27+27

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase (client SDK — auth, realtime, storage, postgrest, functions)
  supabase_flutter: ^2.8.0

  # Native Google Sign-In — used with Supabase signInWithIdToken so we skip
  # the OAuth web flow and Custom Tab callback. Eliminates the deep-link
  # callback race during sign-in.
  google_sign_in: ^6.2.1

  # State management — Riverpod 3 (Notifier/AsyncNotifier API, code-gen first)
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # Navigation — declarative routing with deep-link support (used for Phase 2 invite links)
  go_router: ^14.6.0

  # Typography — Inter (LOIT design system primary face)
  google_fonts: ^6.2.1

  # HTTP — used for Edge Function calls and FX providers
  http: ^1.2.2

  # Offline storage — SQLite queue for transactions added while offline
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.0

  # Image handling — scanner compression + receipt uploads
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  # Pure Dart image processing — used by ScanPreprocessor for grayscale,
  # contrast normalization, deskew, and quality-gate Laplacian variance.
  image: ^4.3.0
  # Disk-backed cache for network avatars + receipt thumbnails (avoids
  # re-downloading on every launch/scroll). See docs/adr/0003.
  cached_network_image: ^3.4.1

  # Charts — budget/spending reports
  fl_chart: ^0.69.2

  # Locale-aware formatting (currency, dates, numbers)
  intl: ^0.20.2

  # Push notifications — Firebase Cloud Messaging for room activity alerts
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0

  # Payments — RevenueCat. Wraps Google Play Billing (and StoreKit on iOS
  # later) and validates every purchase against Google Play / Apple receipts
  # server-side on RevenueCat's side. RevenueCat then posts a signed
  # webhook to the Supabase `revenuecat-webhook` Edge Function, which is
  # the only place that flips `users.tier` / grants top-up credits.
  # Chosen over `in_app_purchase` because it removes the need for a Play
  # Console-linked service account (we do not own the Play developer account).
  purchases_flutter: ^10.0.1

  # Error monitoring — Sentry Flutter v8 (with source maps + release tracking)
  sentry_flutter: ^8.10.0

  # Product analytics — PostHog Flutter v5 (Notifier-friendly, background queueing)
  posthog_flutter: ^5.0.0

  # Secure token storage (used for Supabase session persistence fallback + biometric gate)
  flutter_secure_storage: ^9.2.2

  # Connectivity detection — drives offline UI and triggers sync-on-reconnect.
  # `connectivity_plus` reports interface state only (wifi/mobile/none); we
  # combine it with `internet_connection_checker_plus` for an actual
  # reachability probe (HEAD to Supabase + fallback hosts). Interface-up but
  # no real internet (captive portals, hotspot with no upstream) was
  # previously mis-classified as online, causing transactions to fail-then-
  # queue instead of being routed straight to the offline queue.
  connectivity_plus: ^6.1.0
  internet_connection_checker_plus: ^2.5.2

  # Voice capture (in-app voice transaction, ADR-0022)
  record: ^6.0.0
  # Mic permission requested on screen load — granular status + openAppSettings
  # for the permanently-denied path (ADR-0022 UX amendment).
  permission_handler: ^11.3.1

  # Scanner hardware + QR
  camera: ^0.11.0+2
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  google_mlkit_barcode_scanning: ^0.13.0

  # Biometric app lock (Face ID / Touch ID / Android BiometricPrompt)
  local_auth: ^2.3.0

  # URL launcher — opens external URLs (privacy policy, ToS, support links)
  url_launcher: ^6.3.1

  # Play in-app updates — immediate (Blocked) + flexible (Recommended/Optional)
  # update flows for the Update gate (ADR-0015). Falls back to store_url.
  in_app_update: ^4.2.3

  # Deep linking (Phase 2 invite flow) — handles uni_links + custom schemes + universal links
  app_links: ^6.3.2

  # Persisted user preferences (theme, locale, toggles)
  shared_preferences: ^2.3.2

  # Persistent quick-actions notification — channel control, action buttons,
  # ongoing flag. FCM-only stack can't render persistent system-tray
  # notifications with custom action buttons.
  flutter_local_notifications: ^17.2.3

  # Inexact alarm for midnight rollover that resets the notification body to
  # the new day. Survives process death + reboot. Inexact chosen to avoid
  # SCHEDULE_EXACT_ALARM / USE_EXACT_ALARM (Play policy restricts these to
  # alarm/clock/timer apps); ~15min slop is acceptable here.
  android_alarm_manager_plus: ^4.0.6

  # Reads version + build from native bundle (pubspec `version: x.y.z+build`)
  package_info_plus: ^9.0.1

  # Export
  csv: ^6.0.0
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.1.2
  flutter_svg: ^2.3.0
  showcaseview: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  sentry_dart_plugin: ^3.3.0
  build_runner: ^2.4.13
  custom_lint: ^0.8.1
  riverpod_generator: ^3.0.0
  riverpod_lint: ^3.0.0
  drift_dev: ^2.22.0
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true   # enables gen_l10n for Phase 4 localization  # the material Icons class.
  assets:
    - assets/icons/

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: meimo
